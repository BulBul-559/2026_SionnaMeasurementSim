# SionnaMeasurementSim - formal NR SRS 64 PRB production task template
#
# Intended use:
#   - Copy this file or override the input/output fields for each scene.
#   - Keep this as the baseline recipe for 64 PRB NR SRS formal simulations.
#   - Default density is panel 0p2. Use lighter/heavier panel labels only when
#     the task explicitly asks for them.
#   - The scenario is a 100 MHz FR1 indoor setting at 3.5 GHz, but this task
#     simulates only the occupied 64 PRB SRS bandwidth:
#       64 PRB * 12 subcarriers/PRB = 768 subcarriers
#       768 * 30 kHz = 23.04 MHz active simulated bandwidth
#
# This is an NR SRS standards-shaped subset, not a complete 3GPP-compliant
# implementation.

runtime:
  seed: 42
  device: "cuda"
  require_gpu: false
  precision: "single"
  torch_deterministic: false

debug:
  enabled: true
  hardware_interval_s: 2.0
  link_log_interval: 250
  torch_synchronize: true
  write_hardware_samples: true

input:
  # Replace these three fields for each production scene.
  label_file: "data/front3d_tail20_succ17/front3d_6793/label/label_panel_0p2.json"
  scene_file: "data/front3d_tail20_succ17/front3d_6793/scene.xml"
  scene_id: "front3d_6793"
  map_id: ""
  label_schema: "simplesionna_v1"
  coordinate_system: "scene_local_xyz_m"
  # Keep caps high enough to avoid silently clipping dense labels.
  max_bs: 64
  max_ue: 20000

output:
  profile: "full"
  root_dir: "outputs/front3d_6793_panel0p2_srs_64prb_formal"
  run_id_format: "{label_stem}_{timestamp}"
  hdf5_filename: "results.h5"
  compression: "gzip"
  save_full_paths: true
  save_sampled_paths: true
  save_raw_waveform: false
  sharding:
    enabled: true
    axis: "ue"
    # High-BS Front3D scenes are memory-heavy; shard 5 is the current safer
    # baseline for formal 64 PRB runs. Fallback may split further on OOM.
    shard_size: 5
    filename_pattern: "result_{shard_index:03d}.h5"
    results_dir: "results"
    manifest_dir: "manifest"
    parallel_workers: 8
    gpu_ids: [0, 1, 2, 3, 4, 5, 6, 7]
    visualization_mode: "first_shard"
    fallback:
      enabled: true
      min_shard_size: 1
      split_factor: 2
      retry_errors: ["cuda_oom", "drjit_array_limit"]
      failure_policy: "fail_run"

carrier:
  center_frequency_hz: 3500000000.0
  bandwidth_hz: 23040000.0
  num_subcarriers: 768
  subcarrier_spacing_hz: 30000.0

antenna:
  bs_array:
    type: "planar"
    num_rows: 4
    num_cols: 4
    vertical_spacing_lambda: 0.5
    horizontal_spacing_lambda: 0.5
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]
  ue_array:
    type: "planar"
    num_rows: 1
    num_cols: 2
    vertical_spacing_lambda: 0.5
    horizontal_spacing_lambda: 0.5
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]

array:
  spectrum:
    enabled: true
    sources: ["truth_cfr", "cfr_est", "rx_grid"]
    method: "bartlett"
    zenith_bins: 91
    azimuth_bins: 181
    zenith_min_rad: 0.0
    zenith_max_rad: 3.141592653589793
    azimuth_min_rad: -3.141592653589793
    azimuth_max_rad: 3.141592653589793
    normalize: "per_link_max"
    aggregate_subcarriers: "mean"
    aggregate_symbols: "mean"
    link_chunk_size: 128

visualization:
  enabled: true
  output_dir: "figures"
  sample_policy: "spatially_spread_valid_links"
  random_seed: 42
  max_bs: 5
  sample_ue_count: 5
  max_ue: 5
  dpi: 140
  format: "png"
  radio_map_mode: "both"
  radio_map_grid_resolution_m: null
  radio_map_show_samples: false
  plots:
    - "topology"
    - "link_overview"
    - "cfr_lines"
    - "cfr_heatmap"
    - "cfr_error"
    - "waveform_grid"
    - "aoa"
    - "nlos_paths"
    - "spatial_spectrum"
    - "nmse_snr"
    - "path_samples"
    - "radio_map"

rt:
  engine: "sionna_rt"
  max_depth: 4
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: true
  diffraction: true
  synthetic_array: false
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

link:
  duplex_mode: "tdd"
  phy_link_direction: "uplink"

phy:
  enabled: true
  standard: "nr_srs"
  mimo_mode: "su_mimo"
  channel_backend: "apply_ofdm"
  perfect_csi: false
  snr_db: 30.0
  ebno_db: null
  subcarrier_spacing_khz: 30
  num_ofdm_symbols: 14
  num_prb: 64
  num_layers: 1
  num_antenna_ports: 2
  mcs_index: 0
  mcs_table: 1
  pusch_dmrs_config_type: 1
  pusch_dmrs_length: 1
  pusch_dmrs_additional_position: 2
  pusch_num_cdm_groups_without_data: 2
  mimo_detector: "none"
  channel_estimator: "srs_ls"
  receiver_failure_policy: "mark_invalid"
  su_mimo_link_batch_size: 1
  # Formal observation default: 23 dBm is a common UE maximum uplink power
  # class. With absolute thermal noise, TX power changes SNR/RSSI physically
  # instead of keeping every link at a fixed relative SNR.
  tx_power_dbm: 23.0
  power:
    reference_tx_power_dbm: 0.0
    apply_tx_power_to_grid: true
    noise_mode: "absolute_thermal"
    thermal_noise:
      temperature_k: 290.0
      noise_figure_db: 7.0
      bandwidth_hz: null
    uplink_control:
      enabled: false
      serving_rx_policy: "strongest_path"
      open_loop_enabled: true
      p0_dbm: 0.0
      alpha: 0.8
      closed_loop_enabled: false
      tpc_offset_db: 0.0
      accumulation_db: 0.0
      min_tx_power_dbm: -40.0
      max_tx_power_dbm: 23.0
  srs:
    slot_length_symbols: 14
    start_symbol: 12
    num_srs_symbols: 2
    comb_size: 2
    comb_offset: 0
    bwp_start_prb: 0
    bwp_num_prb: 64
    trigger_mode: "aperiodic"
    periodicity_slots: 1
    slot_offset: 0
    slot_number: 0
    sequence_type: "nr_zc"
    sequence_id: 0
    group_hopping: "enabled"
    sequence_hopping: "enabled"
    cyclic_shift_multiplexing: "cyclic_shift"
    cyclic_shift_indices: null
    hopping:
      enabled: false
      frequency_offsets_prb: []
      bandwidth_num_prb: []
    ports:
      num_srs_ports: null
      mapping: "one_to_one"
      port_tx_ant_map: null
      usage: "non_codebook"
    power_control:
      enabled: false
      p0_dbm: 0.0
      alpha: 0.8
      min_tx_power_dbm: -40.0
      max_tx_power_dbm: 23.0
      serving_rx_policy: "strongest_path"

impairments:
  awgn:
    enabled: true
  cfo:
    enabled: true
    cfo_hz: 100.0
  sfo:
    enabled: true
    sfo_ppm: 5.0
  phase_noise:
    enabled: true
    phase_offset_rad: 0.5
  timing_offset:
    enabled: true
    timing_offset_samples: 1.0
  agc_adc:
    enabled: true
    agc_gain_db: 0.0
    # Keep clipping disabled until ADC full-scale calibration is modeled.
    clipping_threshold: null
  impairment_seed: 142

ranging:
  enabled: true
  source: "cfr_est"
  estimators: ["pdp_peak", "phase_slope"]
  default_estimator: "pdp_peak"
  write_rtt_equivalent: true
  pdp_peak:
    oversampling_factor: 8
    window: "hann"
    peak_policy: "earliest_above_relative_threshold"
    relative_threshold_db: -12.0
    min_peak_snr_db: 6.0
    interpolation: "parabolic_log_power"
    max_delay_s: null
  phase_slope:
    unwrap: true
    aggregate: "power_weighted_median"
    min_mean_power: 1.0e-12

receiver:
  estimator_type: "srs_ls"
  channel_estimator: "srs_ls"
  mimo_detector: "none"
  sync_method: "ideal"
  interpolation_method: "none"
  failure_policy: "mark_invalid"
  calibration_profile_id: "synthetic_default"

motion:
  enabled: true
  mobility_mode: "static"
  # Formal static positioning runs use one snapshot. Increase only for explicit
  # motion/Doppler experiments; otherwise storage and spectrum cost scale with
  # this value.
  num_time_steps: 1
  sampling_frequency_hz: 100.0
  bs_velocity_mps: [0.0, 0.0, 0.0]
  ue_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: true
  profile_id: "synthetic_default"
