# SionnaMeasurementSim - formal NR SRS 64 PRB CFR-truth-only task template
#
# This template is derived from nr_srs_64prb_formal.yaml, but trims the full
# output contract to /channel/truth/cfr plus mandatory metadata via
# output.products=["cfr_truth"]. Use this for large Front3D 0p5 CFR truth
# generation where PHY observation, path samples, spatial spectrum, ranging and
# figures are not needed.
#
# Intended use:
#   - Override input.label_file, input.scene_file, input.scene_id and
#     output.root_dir per scene or through the scene-index runner.
#   - Keep the 64 PRB FR1 carrier/antenna/RT settings aligned with the formal
#     full template. PHY/SRS settings remain as metadata/reference knobs but are
#     not executed because this template only writes RT CFR truth.
#   - Default label density for the current Front3D CFR-only queue is panel 0p5.

runtime:
  seed: 42
  device: "cuda"
  require_gpu: false
  precision: "single"
  torch_deterministic: false

debug:
  enabled: true
  hardware_interval_s: 2.0
  link_log_interval: 250
  torch_synchronize: true
  write_hardware_samples: true

input:
  # Replace these three fields for each production scene.
  label_file: "data/front3d_full/normal_room/front3d_0002/label/label_panel_0p5.json"
  scene_file: "data/front3d_full/normal_room/front3d_0002/scene.xml"
  scene_id: "front3d_0002"
  map_id: ""
  label_schema: "simplesionna_v1"
  coordinate_system: "scene_local_xyz_m"
  # Keep caps high enough to avoid silently clipping dense labels.
  max_bs: 64
  max_ue: 20000

output:
  profile: "full"
  products: ["cfr_truth"]
  root_dir: "outputs/front3d_0002_panel0p5_cfr_truth_only_srs64prb"
  run_id_format: "{label_stem}_{timestamp}"
  hdf5_filename: "results.h5"
  compression: "mixed"
  gzip_level: 1
  save_full_paths: false
  save_sampled_paths: false
  save_raw_waveform: false
  sharding:
    enabled: true
    axis: "ue"
    # CFR-truth-only runs are lighter than the full formal template. The
    # current validated Front3D 0p5 CFR-only baseline uses shard_size=20; OOM
    # fallback may split further if a scene is unusually dense.
    shard_size: 20
    filename_pattern: "result_{shard_index:03d}.h5"
    results_dir: "results"
    manifest_dir: "manifest"
    parallel_workers: 8
    gpu_ids: [0, 1, 2, 3, 4, 5, 6, 7]
    visualization_mode: "none"
    gpu_scheduler:
      enabled: true
      free_memory_threshold: 0.6
      scan_interval_s: 1.0
      cross_scene_pipeline: true
    fallback:
      enabled: true
      min_shard_size: 1
      split_factor: 2
      retry_errors: ["cuda_oom", "drjit_array_limit"]
      failure_policy: "fail_run"

carrier:
  center_frequency_hz: 3500000000.0
  bandwidth_hz: 23040000.0
  num_subcarriers: 768
  subcarrier_spacing_hz: 30000.0

antenna:
  bs_array:
    type: "planar"
    num_rows: 4
    num_cols: 4
    vertical_spacing_lambda: 0.5
    horizontal_spacing_lambda: 0.5
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]
  ue_array:
    type: "planar"
    num_rows: 1
    num_cols: 2
    vertical_spacing_lambda: 0.5
    horizontal_spacing_lambda: 0.5
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]

array:
  spectrum:
    enabled: false
    sources: ["truth_cfr"]
    method: "bartlett"
    zenith_bins: 91
    azimuth_bins: 181
    zenith_min_rad: 0.0
    zenith_max_rad: 3.141592653589793
    azimuth_min_rad: -3.141592653589793
    azimuth_max_rad: 3.141592653589793
    normalize: "per_link_max"
    aggregate_subcarriers: "mean"
    aggregate_symbols: "mean"
    link_chunk_size: 128

visualization:
  enabled: false
  output_dir: "figures"
  sample_policy: "spatially_spread_valid_links"
  random_seed: 42
  max_bs: 5
  sample_ue_count: 5
  max_ue: 5
  dpi: 140
  format: "png"
  radio_map_mode: "both"
  radio_map_grid_resolution_m: null
  radio_map_show_samples: false
  plots: []

rt:
  engine: "sionna_rt"
  max_depth: 4
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: true
  diffraction: true
  synthetic_array: false
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

link:
  duplex_mode: "tdd"
  phy_link_direction: "uplink"

phy:
  enabled: false
  standard: "nr_srs"
  mimo_mode: "su_mimo"
  channel_backend: "apply_ofdm"
  perfect_csi: false
  snr_db: 30.0
  ebno_db: null
  subcarrier_spacing_khz: 30
  num_ofdm_symbols: 14
  num_prb: 64
  num_layers: 1
  num_antenna_ports: 2
  mcs_index: 0
  mcs_table: 1
  pusch_dmrs_config_type: 1
  pusch_dmrs_length: 1
  pusch_dmrs_additional_position: 2
  pusch_num_cdm_groups_without_data: 2
  mimo_detector: "none"
  channel_estimator: "srs_ls"
  receiver_failure_policy: "mark_invalid"
  su_mimo_link_batch_size: 1
  tx_power_dbm: 23.0
  power:
    reference_tx_power_dbm: 0.0
    apply_tx_power_to_grid: true
    noise_mode: "absolute_thermal"
    thermal_noise:
      temperature_k: 290.0
      noise_figure_db: 7.0
      bandwidth_hz: null
    uplink_control:
      enabled: false
      serving_rx_policy: "strongest_path"
      open_loop_enabled: true
      p0_dbm: 0.0
      alpha: 0.8
      closed_loop_enabled: false
      tpc_offset_db: 0.0
      accumulation_db: 0.0
      min_tx_power_dbm: -40.0
      max_tx_power_dbm: 23.0
  iq:
    enabled: false
    clean_output: null
    save_frequency_observed: false
    save_time_observed: false
    cp_length: null
  srs:
    slot_length_symbols: 14
    start_symbol: 12
    num_srs_symbols: 2
    comb_size: 2
    comb_offset: 0
    bwp_start_prb: 0
    bwp_num_prb: 64
    trigger_mode: "aperiodic"
    periodicity_slots: 1
    slot_offset: 0
    slot_number: 0
    sequence_type: "nr_zc"
    sequence_id: 0
    group_hopping: "enabled"
    sequence_hopping: "enabled"
    cyclic_shift_multiplexing: "cyclic_shift"
    cyclic_shift_indices: null
    hopping:
      enabled: false
      frequency_offsets_prb: []
      bandwidth_num_prb: []
    ports:
      num_srs_ports: null
      mapping: "one_to_one"
      port_tx_ant_map: null
      usage: "non_codebook"
    power_control:
      enabled: false
      p0_dbm: 0.0
      alpha: 0.8
      min_tx_power_dbm: -40.0
      max_tx_power_dbm: 23.0
      serving_rx_policy: "strongest_path"
    multiuser:
      enabled: false
      active_ue_count: 2
      resource_strategy: "comb_offset"
      frame_policy: "sequential"

ranging:
  enabled: false

noncooperative:
  enabled: false
  signal_standard: "nr_srs"
  active_tx_count: 2
  frame_policy: "sequential"
  resource_strategy: "comb_offset"
  save_time_clean: true
  save_time_observed: true
  cp_length: null

impairments:
  awgn:
    enabled: false
  cfo:
    enabled: false
    cfo_hz: null
  sfo:
    enabled: false
    sfo_ppm: null
  phase_noise:
    enabled: false
    phase_offset_rad: null
  timing_offset:
    enabled: false
    timing_offset_samples: null
  agc_adc:
    enabled: false
    agc_gain_db: 0.0
    clipping_threshold: null
  impairment_seed: 142

receiver:
  estimator_type: "srs_ls"
  channel_estimator: "srs_ls"
  mimo_detector: "none"
  sync_method: "ideal"
  interpolation_method: "none"
  failure_policy: "mark_invalid"
  calibration_profile_id: "synthetic_default"

motion:
  enabled: false
  mobility_mode: "static"
  num_time_steps: 1
  sampling_frequency_hz: 0.0
  bs_velocity_mps: [0.0, 0.0, 0.0]
  ue_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: false
  profile_id: "synthetic_default"
