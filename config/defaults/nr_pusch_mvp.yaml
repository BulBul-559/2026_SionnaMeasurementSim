# SionnaMeasurementSim – NR PUSCH 4x4 SU-MIMO TDD uplink default config
# All physical quantities are in SI units unless stated otherwise.
#
# This config targets a single-BS, single-UE 4x4 SU-MIMO uplink scenario
# using 5G NR PUSCH with TDD reciprocity.
#
# Supported mimo_mode values: "su_mimo" (current), "mu_mimo"
# Supported channel_backend values: "apply_ofdm" (stable), "cir_dataset_ofdm"

runtime:
  seed: 42
  device: "cpu"
  require_gpu: false
  precision: "single"
  torch_deterministic: false

debug:
  enabled: false
  hardware_interval_s: 1.0
  link_log_interval: 250
  torch_synchronize: true
  write_hardware_samples: true

input:
  # Standard label 0.1.0: top-level bs_points/ue_points are the full-scene default.
  label_file: "tests/fixtures/scenes/test/test5.json"
  scene_file: "tests/fixtures/scenes/test/scene.xml"
  scene_id: "scene"
  map_id: ""
  label_schema: "simplesionna_v1"
  coordinate_system: "scene_local_xyz_m"
  max_bs: 1               # 1 BS
  max_ue: 1               # 1 UE (SU-MIMO)

output:
  profile: "full"                 # "full" | "rt_lite" | "rt_labels_only"
  root_dir: "outputs"
  run_id_format: "{label_stem}_{timestamp}"
  hdf5_filename: "results.h5"
  compression: "gzip"
  save_full_paths: false
  sharding:
    enabled: false
    axis: "ue"
    shard_size: 1000
    filename_pattern: "result_{shard_index:03d}.h5"
    results_dir: "results"
    manifest_dir: "manifest"
    parallel_workers: 1
    gpu_ids: []
    visualization_mode: "first_shard"
    fallback:
      enabled: true
      min_shard_size: 1
      split_factor: 2
      retry_errors: ["cuda_oom", "drjit_array_limit"]
      failure_policy: "fail_run"

carrier:
  center_frequency_hz: 3500000000.0
  bandwidth_hz: 20000000.0
  num_subcarriers: 48        # 4 PRB * 12 SC/PRB = 48

antenna:
  bs_array:
    num_rows: 2                # BS: 2x2 = 4 antennas
    num_cols: 2
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]
  ue_array:
    num_rows: 2                # UE: 2x2 = 4 antennas
    num_cols: 2
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]

array:
  spectrum:
    enabled: false
    sources: ["truth_cfr", "cfr_est", "rx_grid"]
    method: "bartlett"
    zenith_bins: 91
    azimuth_bins: 181
    zenith_min_rad: 0.0
    zenith_max_rad: 3.141592653589793
    azimuth_min_rad: -3.141592653589793
    azimuth_max_rad: 3.141592653589793
    normalize: "per_link_max"
    aggregate_subcarriers: "mean"
    aggregate_symbols: "mean"
    link_chunk_size: 512

visualization:
  enabled: true
  output_dir: "figures"
  sample_policy: "valid_links_first" # "valid_links_first" | "spatially_spread_valid_links" | "random" | "first"
  random_seed: 42
  max_bs: 5
  sample_ue_count: 3
  max_ue: 5
  dpi: 140
  format: "png"
  # CFR plots are exported as magnitude/phase PNG pairs.
  # spatial_spectrum is exported per source plus polar hemisphere PNGs when present.
  plots:
    - "topology"
    - "link_overview"
    - "cfr_lines"
    - "cfr_heatmap"
    - "cfr_error"
    - "waveform_grid"
    - "aoa"
    - "nlos_paths"
    - "spatial_spectrum"
    - "nmse_snr"
    - "path_samples"

rt:
  max_depth: 3
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: false
  diffraction: false
  synthetic_array: false
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

link:
  duplex_mode: "tdd"
  phy_link_direction: "uplink"

phy:
  enabled: true
  standard: "nr_pusch"
  # ── MIMO mode ──
  mimo_mode: "su_mimo"          # "su_mimo" | "mu_mimo"
  channel_backend: "apply_ofdm" # "apply_ofdm" | "cir_dataset_ofdm"
  # ── CSI ──
  perfect_csi: false            # true = receiver uses true channel; false = DMRS LS estimate
  snr_db: 30.0
  ebno_db: null                 # Eb/N0 in dB; when set, takes precedence over snr_db
  # ── NR PUSCH ──
  num_prb: 4                    # 4 PRB → 48 subcarriers
  num_layers: 4                 # spatial layers per UE (4 = full rank)
  num_antenna_ports: 4          # antenna ports per UE (4 = 4x4 MIMO)
  mcs_index: 14
  mcs_table: 1                  # 1 = 64QAM table; 0 = 256QAM
  subcarrier_spacing_khz: 30
  num_ofdm_symbols: 14
  pusch_dmrs_config_type: 1
  pusch_dmrs_length: 1
  pusch_dmrs_additional_position: 1
  pusch_num_cdm_groups_without_data: 2
  # ── Receiver ──
  mimo_detector: "lmmse"        # "lmmse" | "kbest"
  channel_estimator: "pusch_ls" # "pusch_ls" | "perfect"
  receiver_failure_policy: "fail_fast"  # "fail_fast" | "mark_invalid"
  su_mimo_link_batch_size: 64   # batch independent SU-MIMO links per receiver call
  tx_power_dbm: 0.0
  power:
    reference_tx_power_dbm: 0.0
    apply_tx_power_to_grid: true
    noise_mode: "relative_snr"  # "relative_snr" keeps configured SNR; "absolute_thermal" fixes kTB+NF noise
    thermal_noise:
      temperature_k: 290.0
      noise_figure_db: 7.0
      bandwidth_hz: null
    uplink_control:
      enabled: false
      serving_rx_policy: "strongest_path"
      open_loop_enabled: true
      p0_dbm: 0.0
      alpha: 0.8
      closed_loop_enabled: false
      tpc_offset_db: 0.0
      accumulation_db: 0.0
      min_tx_power_dbm: -40.0
      max_tx_power_dbm: 23.0
  srs:
    slot_length_symbols: 14
    start_symbol: 12
    num_srs_symbols: 2
    comb_size: 2
    comb_offset: 0
    bwp_start_prb: 0
    bwp_num_prb: null
    trigger_mode: "aperiodic"
    periodicity_slots: 1
    slot_offset: 0
    slot_number: 0
    sequence_type: "zc_like"
    sequence_id: 0
    group_hopping: "disabled"
    sequence_hopping: "disabled"
    cyclic_shift_multiplexing: "cyclic_shift"
    cyclic_shift_indices: null
    hopping:
      enabled: false
      frequency_offsets_prb: []
      bandwidth_num_prb: []
    ports:
      num_srs_ports: null
      mapping: "one_to_one"
      port_tx_ant_map: null
      usage: "non_codebook"
    power_control:
      enabled: false
      p0_dbm: 0.0
      alpha: 0.8
      min_tx_power_dbm: -40.0
      max_tx_power_dbm: 23.0
      serving_rx_policy: "strongest_path"
    multiuser:
      enabled: false
      active_ue_count: 2
      resource_strategy: "comb_offset"
      frame_policy: "sequential"

impairments:
  awgn:
    enabled: true
  cfo:
    enabled: false
    cfo_hz: null
  sfo:
    enabled: false
    sfo_ppm: null
  phase_noise:
    enabled: false
    phase_offset_rad: null
  timing_offset:
    enabled: false
    timing_offset_samples: null
  agc_adc:
    enabled: false
    agc_gain_db: 0.0
    clipping_threshold: null
  impairment_seed: 142

ranging:
  enabled: false
  source: "cfr_est"
  estimators: ["pdp_peak", "phase_slope"]
  default_estimator: "pdp_peak"
  write_rtt_equivalent: true
  pdp_peak:
    oversampling_factor: 8
    window: "hann"
    peak_policy: "earliest_above_relative_threshold"
    relative_threshold_db: -12.0
    min_peak_snr_db: 6.0
    interpolation: "parabolic_log_power"
    max_delay_s: null
  phase_slope:
    unwrap: true
    aggregate: "power_weighted_median"
    min_mean_power: 1.0e-12

receiver:
  estimator_type: "pusch_ls"    # HDF5 /receiver/estimator_type
  channel_estimator: "pusch_ls"
  mimo_detector: "lmmse"
  sync_method: "ideal"
  interpolation_method: "lin"
  failure_policy: "fail_fast"
  calibration_profile_id: "synthetic_default"

motion:
  enabled: false
  mobility_mode: "static"
  num_time_steps: 1
  sampling_frequency_hz: 0.0
  bs_velocity_mps: [0.0, 0.0, 0.0]
  ue_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: true
  profile_id: "synthetic_default"
