# SionnaMeasurementSim - indoor FR1 NR SRS subset positioning template
# This is a standards-shaped NR SRS subset, not a complete 3GPP NR SRS
# implementation. See docs/sys/nr_srs_standard_todo.md for the remaining
# details before calling it standards-complete SRS.

runtime:
  seed: 42
  device: "cuda"

debug:
  enabled: false
  hardware_interval_s: 1.0
  link_log_interval: 250
  torch_synchronize: true
  write_hardware_samples: true

input:
  label_file: "data/bistro_0000/label.json"
  scene_file: "data/bistro_0000/scene.xml"
  scene_id: "bistro_0000"
  map_id: ""
  max_bs: 7
  max_ue: 2500

output:
  root_dir: "outputs/bistro_0000_nr_srs_fr1_100mhz"
  hdf5_filename: "results.h5"
  compression: "gzip"
  save_full_paths: false
  sharding:
    enabled: true
    axis: "ue"
    shard_size: 20          # production-safe SRS UE block for 7 BS / 24 GB GPUs
    filename_pattern: "result_{shard_index:03d}.h5"
    results_dir: "results"
    manifest_dir: "manifest"
    parallel_workers: 1
    gpu_ids: []
    visualization_mode: "first_shard"
    fallback:
      enabled: true
      min_shard_size: 1
      split_factor: 2
      retry_errors: ["cuda_oom", "drjit_array_limit"]
      failure_policy: "fail_run"

carrier:
  center_frequency_hz: 3500000000.0
  bandwidth_hz: 98280000.0
  num_subcarriers: 3276

antenna:
  bs_array:
    num_rows: 4
    num_cols: 4
    vertical_spacing_lambda: 0.5
    horizontal_spacing_lambda: 0.5
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]
  ue_array:
    num_rows: 1
    num_cols: 2
    vertical_spacing_lambda: 0.5
    horizontal_spacing_lambda: 0.5
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]

array:
  spectrum:
    enabled: false          # enable explicitly for spatial-spectrum datasets; expensive at scale
    sources: []
    method: "bartlett"
    zenith_bins: 91
    azimuth_bins: 181
    zenith_min_rad: 0.0
    zenith_max_rad: 3.141592653589793
    azimuth_min_rad: -3.141592653589793
    azimuth_max_rad: 3.141592653589793
    normalize: "per_link_max"
    aggregate_subcarriers: "mean"
    aggregate_symbols: "mean"
    link_chunk_size: 128

visualization:
  enabled: false            # enable explicitly for sampled diagnostics; expensive at scale
  output_dir: "figures"
  sample_policy: "spatially_spread_valid_links"
  random_seed: 42
  max_bs: 5
  sample_ue_count: 5
  max_ue: 5
  dpi: 140
  format: "png"
  plots:
    - "topology"
    - "link_overview"
    - "cfr_lines"
    - "cfr_heatmap"
    - "cfr_error"
    - "waveform_grid"
    - "aoa"
    - "nlos_paths"
    - "spatial_spectrum"
    - "nmse_snr"
    - "path_samples"

rt:
  max_depth: 4
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: true
  diffraction: true
  synthetic_array: false
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

link:
  duplex_mode: "tdd"
  phy_link_direction: "uplink"

phy:
  enabled: true
  standard: "nr_srs"
  mimo_mode: "su_mimo"
  channel_backend: "apply_ofdm"
  perfect_csi: false
  snr_db: 30.0
  ebno_db: null
  subcarrier_spacing_khz: 30
  num_ofdm_symbols: 14
  num_prb: 273
  num_layers: 1
  num_antenna_ports: 2
  mcs_index: 0
  mcs_table: 1
  pusch_dmrs_config_type: 1
  pusch_dmrs_length: 1
  pusch_dmrs_additional_position: 2
  pusch_num_cdm_groups_without_data: 2
  mimo_detector: "none"
  channel_estimator: "srs_ls"
  receiver_failure_policy: "mark_invalid"
  su_mimo_link_batch_size: 1
  tx_power_dbm: 0.0
  srs:
    slot_length_symbols: 14
    start_symbol: 12
    num_srs_symbols: 2
    comb_size: 2
    comb_offset: 0
    bwp_start_prb: 0
    bwp_num_prb: null
    trigger_mode: "aperiodic"
    periodicity_slots: 1
    slot_offset: 0
    slot_number: 0
    sequence_type: "zc_like"
    sequence_id: 0
    group_hopping: "disabled"
    sequence_hopping: "disabled"
    cyclic_shift_multiplexing: "cyclic_shift"
    cyclic_shift_indices: null
    hopping:
      enabled: false
      frequency_offsets_prb: []
      bandwidth_num_prb: []
    ports:
      num_srs_ports: null
      mapping: "one_to_one"
      port_tx_ant_map: null
      usage: "non_codebook"
    power_control:
      enabled: false
      p0_dbm: 0.0
      alpha: 0.8
      min_tx_power_dbm: -40.0
      max_tx_power_dbm: 23.0
      serving_rx_policy: "strongest_path"

impairments:
  awgn:
    enabled: true
  cfo:
    enabled: false
    cfo_hz: null
  sfo:
    enabled: false
    sfo_ppm: null
  phase_noise:
    enabled: false
    phase_offset_rad: null
  timing_offset:
    enabled: false
    timing_offset_samples: null
  agc_adc:
    enabled: false
    agc_gain_db: 0.0
    clipping_threshold: null
  impairment_seed: 142

ranging:
  enabled: false
  source: "cfr_est"
  estimators: ["pdp_peak", "phase_slope"]
  default_estimator: "pdp_peak"
  write_rtt_equivalent: true
  pdp_peak:
    oversampling_factor: 8
    window: "hann"
    peak_policy: "earliest_above_relative_threshold"
    relative_threshold_db: -12.0
    min_peak_snr_db: 6.0
    interpolation: "parabolic_log_power"
    max_delay_s: null
  phase_slope:
    unwrap: true
    aggregate: "power_weighted_median"
    min_mean_power: 1.0e-12

receiver:
  estimator_type: "srs_ls"
  channel_estimator: "srs_ls"
  mimo_detector: "none"
  sync_method: "ideal"
  interpolation_method: "none"
  failure_policy: "mark_invalid"
  calibration_profile_id: "synthetic_default"

motion:
  enabled: false
  mobility_mode: "static"
  num_time_steps: 1
  sampling_frequency_hz: 0.0
  bs_velocity_mps: [0.0, 0.0, 0.0]
  ue_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: true
  profile_id: "synthetic_default"
