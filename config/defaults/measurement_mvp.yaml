# SionnaMeasurementSim – Measurement MVP default config
# All physical quantities are in SI units unless stated otherwise.
#
# This config targets the custom OFDM waveform with impairments and Doppler.
# For NR PUSCH MIMO, use config/defaults/nr_pusch_mvp.yaml instead.
# For NR SRS subset sounding, use config/defaults/nr_srs_indoor_positioning_fr1_100mhz.yaml.
#
# IMPORTANT: when switching phy.standard to "nr_pusch", the PUSCH chain
# uses num_subcarriers = num_prb * 12.  Make sure this matches
# carrier.num_subcarriers, or use the nr_pusch_mvp.yaml which has them
# aligned (num_prb=4, num_subcarriers=48).

runtime:
  seed: 42
  device: "cpu"

debug:
  enabled: false
  hardware_interval_s: 1.0
  link_log_interval: 250
  torch_synchronize: true
  write_hardware_samples: true

input:
  # Standard label 0.1.0: top-level bs_points/ue_points are the full-scene default.
  label_file: "tests/fixtures/scenes/test/test5.json"
  scene_file: "tests/fixtures/scenes/test/scene.xml"
  scene_id: "scene"
  map_id: ""
  max_bs: 6
  max_ue: 100

output:
  root_dir: "outputs"
  hdf5_filename: "results.h5"
  compression: "gzip"
  save_full_paths: false
  sharding:
    enabled: false
    axis: "ue"
    shard_size: 1000
    filename_pattern: "result_{shard_index:03d}.h5"
    results_dir: "results"
    manifest_dir: "manifest"
    parallel_workers: 1
    gpu_ids: []
    visualization_mode: "first_shard"
    fallback:
      enabled: true
      min_shard_size: 1
      split_factor: 2
      retry_errors: ["cuda_oom", "drjit_array_limit"]
      failure_policy: "fail_run"

carrier:
  center_frequency_hz: 3500000000.0   # 3.5 GHz
  bandwidth_hz: 20000000.0            # 20 MHz
  num_subcarriers: 64

antenna:
  bs_array:
    num_rows: 2
    num_cols: 2
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]
  ue_array:
    num_rows: 2
    num_cols: 2
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]

array:
  spectrum:
    enabled: false
    sources: ["truth_cfr", "cfr_est", "rx_grid"]
    method: "bartlett"
    zenith_bins: 91
    azimuth_bins: 181
    zenith_min_rad: 0.0
    zenith_max_rad: 3.141592653589793
    azimuth_min_rad: -3.141592653589793
    azimuth_max_rad: 3.141592653589793
    normalize: "per_link_max"
    aggregate_subcarriers: "mean"
    aggregate_symbols: "mean"
    link_chunk_size: 512

visualization:
  enabled: true
  output_dir: "figures"
  sample_policy: "valid_links_first" # "valid_links_first" | "spatially_spread_valid_links" | "random" | "first"
  random_seed: 42
  max_bs: 5
  sample_ue_count: 3
  max_ue: 5
  dpi: 140
  format: "png"
  # CFR plots are exported as magnitude/phase PNG pairs.
  # spatial_spectrum is exported per source plus polar hemisphere PNGs when present.
  plots:
    - "topology"
    - "link_overview"
    - "cfr_lines"
    - "cfr_heatmap"
    - "cfr_error"
    - "waveform_grid"
    - "aoa"
    - "nlos_paths"
    - "spatial_spectrum"
    - "nmse_snr"
    - "path_samples"

rt:
  max_depth: 1
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: false
  diffraction: false
  synthetic_array: false
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

# ── link: TDD uplink configuration (used for NR PUSCH) ──
link:
  duplex_mode: "tdd"
  phy_link_direction: "uplink"

phy:
  enabled: true
  standard: "custom_ofdm"        # "custom_ofdm" | "nr_pusch" | "nr_srs"
  snr_db: 30.0
  fft_size: 64
  cp_length: 0
  num_ofdm_symbols: 1
  tx_power_dbm: 0.0
  # ── NR-family fields (used by nr_pusch and nr_srs where applicable) ──
  perfect_csi: false
  ebno_db: null
  num_prb: 16                    # must satisfy num_prb * 12 == num_subcarriers
  num_layers: 1
  num_antenna_ports: 4
  mcs_index: 14
  mcs_table: 1
  subcarrier_spacing_khz: 30
  pusch_dmrs_config_type: 1
  pusch_dmrs_length: 1
  pusch_dmrs_additional_position: 1
  pusch_num_cdm_groups_without_data: 2
  # ── MIMO / receiver (NR PUSCH) ──
  mimo_mode: "su_mimo"
  channel_backend: "apply_ofdm"
  mimo_detector: "lmmse"
  channel_estimator: "pusch_ls"
  receiver_failure_policy: "fail_fast"
  su_mimo_link_batch_size: 1
  srs:
    slot_length_symbols: 14
    start_symbol: 12
    num_srs_symbols: 2
    comb_size: 2
    comb_offset: 0
    bwp_start_prb: 0
    bwp_num_prb: null
    trigger_mode: "aperiodic"
    periodicity_slots: 1
    slot_offset: 0
    slot_number: 0
    sequence_type: "zc_like"
    sequence_id: 0
    group_hopping: "disabled"
    sequence_hopping: "disabled"
    cyclic_shift_multiplexing: "cyclic_shift"
    cyclic_shift_indices: null
    hopping:
      enabled: false
      frequency_offsets_prb: []
      bandwidth_num_prb: []
    ports:
      num_srs_ports: null
      mapping: "one_to_one"
      port_tx_ant_map: null
      usage: "non_codebook"
    power_control:
      enabled: false
      p0_dbm: 0.0
      alpha: 0.8
      min_tx_power_dbm: -40.0
      max_tx_power_dbm: 23.0
      serving_rx_policy: "strongest_path"

impairments:
  awgn:
    enabled: true
  cfo:
    enabled: true
    cfo_hz: 100.0
  sfo:
    enabled: true
    sfo_ppm: 5.0
  phase_noise:
    enabled: true
    phase_offset_rad: 0.5
  timing_offset:
    enabled: true
    timing_offset_samples: 2.0
  agc_adc:
    enabled: true
    agc_gain_db: 0.0
    clipping_threshold: 3.0
  impairment_seed: 142

ranging:
  enabled: false
  source: "cfr_est"
  estimators: ["pdp_peak", "phase_slope"]
  default_estimator: "pdp_peak"
  write_rtt_equivalent: true
  pdp_peak:
    oversampling_factor: 8
    window: "hann"
    peak_policy: "earliest_above_relative_threshold"
    relative_threshold_db: -12.0
    min_peak_snr_db: 6.0
    interpolation: "parabolic_log_power"
    max_delay_s: null
  phase_slope:
    unwrap: true
    aggregate: "power_weighted_median"
    min_mean_power: 1.0e-12

receiver:
  estimator_type: "ls"
  sync_method: "ideal"
  channel_estimator: "pusch_ls"
  mimo_detector: "lmmse"
  interpolation_method: "none"
  failure_policy: "mark_invalid"
  calibration_profile_id: "synthetic_default"

motion:
  enabled: false                  # disable for basic runs; enable for Doppler
  mobility_mode: "static"
  num_time_steps: 1
  sampling_frequency_hz: 0.0
  bs_velocity_mps: [0.0, 0.0, 0.0]
  ue_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: true
  profile_id: "synthetic_default"
