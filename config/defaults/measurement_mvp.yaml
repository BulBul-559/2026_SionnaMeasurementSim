# SionnaMeasurementSim – Measurement MVP default config
# All physical quantities are in SI units unless stated otherwise.
# Only fields that actually take effect in the pipeline are listed.

runtime:
  seed: 42
  device: "cpu"

input:
  label_file: "data/scenes/test/test5.json"
  scene_file: "data/scenes/test/scene.xml"
  max_tx: 6
  max_rx: 100

output:
  root_dir: "outputs"
  hdf5_filename: "results.h5"
  save_full_paths: false

carrier:
  center_frequency_hz: 3500000000.0   # 3.5 GHz
  bandwidth_hz: 20000000.0            # 20 MHz
  num_subcarriers: 64

antenna:
  tx_array:
    num_rows: 2
    num_cols: 2
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]
  rx_array:
    num_rows: 2
    num_cols: 2
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]

rt:
  max_depth: 1
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: false
  diffraction: false
  synthetic_array: false
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

phy:
  enabled: true
  snr_db: 30.0
  fft_size: 64
  cp_length: 0
  num_ofdm_symbols: 1
  tx_power_dbm: 0.0

impairments:
  awgn:
    enabled: true
  cfo:
    enabled: true
    cfo_hz: 100.0
  sfo:
    enabled: true
    sfo_ppm: 5.0
  phase_noise:
    enabled: true
    phase_offset_rad: 0.5
  timing_offset:
    enabled: true
    timing_offset_samples: 2.0
  agc_adc:
    enabled: true
    agc_gain_db: 0.0
    clipping_threshold: 3.0
  impairment_seed: 142

receiver:
  estimator_type: "ls"
  sync_method: "ideal"
  calibration_profile_id: "synthetic_default"

motion:
  enabled: true
  mobility_mode: "doppler_synthetic"
  num_time_steps: 5
  sampling_frequency_hz: 200.0
  tx_velocity_mps: [1.0, 0.0, 0.0]
  rx_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: true
  profile_id: "synthetic_default"
