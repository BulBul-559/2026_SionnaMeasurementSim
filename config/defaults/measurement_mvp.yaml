# SionnaMeasurementSim – Measurement MVP default config
# All physical quantities are in SI units unless stated otherwise.
#
# This config targets the custom OFDM waveform with impairments and Doppler.
# For NR PUSCH MIMO, use config/defaults/nr_pusch_mvp.yaml instead.
#
# IMPORTANT: when switching phy.standard to "nr_pusch", the PUSCH chain
# uses num_subcarriers = num_prb * 12.  Make sure this matches
# carrier.num_subcarriers, or use the nr_pusch_mvp.yaml which has them
# aligned (num_prb=4, num_subcarriers=48).

runtime:
  seed: 42
  device: "cpu"

input:
  label_file: "data/scenes/test/test5.json"
  scene_file: "data/scenes/test/scene.xml"
  scene_id: "scene"
  map_id: ""
  max_tx: 6
  max_rx: 100

output:
  root_dir: "outputs"
  hdf5_filename: "results.h5"
  save_full_paths: false

carrier:
  center_frequency_hz: 3500000000.0   # 3.5 GHz
  bandwidth_hz: 20000000.0            # 20 MHz
  num_subcarriers: 64

antenna:
  tx_array:
    num_rows: 2
    num_cols: 2
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]
  rx_array:
    num_rows: 2
    num_cols: 2
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]

rt:
  max_depth: 1
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: false
  diffraction: false
  synthetic_array: false
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

# ── link: TDD uplink configuration (used for NR PUSCH) ──
link:
  duplex_mode: "tdd"
  phy_link_direction: "uplink"
  rt_trace_direction: "bs_to_ue"
  reciprocity_mode: "transpose_rt_channel"
  reciprocity_applied: true

phy:
  enabled: true
  standard: "custom_ofdm"        # "custom_ofdm" | "nr_pusch"
  snr_db: 30.0
  fft_size: 64
  cp_length: 0
  num_ofdm_symbols: 1
  tx_power_dbm: 0.0
  # ── NR PUSCH fields (only used when standard == "nr_pusch") ──
  perfect_csi: false
  ebno_db: null
  num_prb: 16                    # must satisfy num_prb * 12 == num_subcarriers
  num_layers: 1
  num_antenna_ports: 4
  mcs_index: 14
  mcs_table: 1
  subcarrier_spacing_khz: 30
  pusch_dmrs_config_type: 1
  pusch_dmrs_length: 1
  pusch_dmrs_additional_position: 1
  pusch_num_cdm_groups_without_data: 2
  # ── MIMO / receiver (NR PUSCH) ──
  mimo_mode: "su_mimo"
  channel_backend: "apply_ofdm"
  mimo_detector: "lmmse"
  channel_estimator: "pusch_ls"
  receiver_failure_policy: "fail_fast"

impairments:
  awgn:
    enabled: true
  cfo:
    enabled: true
    cfo_hz: 100.0
  sfo:
    enabled: true
    sfo_ppm: 5.0
  phase_noise:
    enabled: true
    phase_offset_rad: 0.5
  timing_offset:
    enabled: true
    timing_offset_samples: 2.0
  agc_adc:
    enabled: true
    agc_gain_db: 0.0
    clipping_threshold: 3.0
  impairment_seed: 142

receiver:
  estimator_type: "ls"
  sync_method: "ideal"
  channel_estimator: "pusch_ls"
  mimo_detector: "lmmse"
  interpolation_method: "none"
  failure_policy: "mark_invalid"
  calibration_profile_id: "synthetic_default"

motion:
  enabled: false                  # disable for basic runs; enable for Doppler
  mobility_mode: "static"
  num_time_steps: 1
  sampling_frequency_hz: 0.0
  tx_velocity_mps: [0.0, 0.0, 0.0]
  rx_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: true
  profile_id: "synthetic_default"
