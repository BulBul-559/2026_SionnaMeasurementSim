# Compact RT labels-only preset.
# Writes HDF5 contract `sionna_measurement_rt_labels` with `/labels/link/*`.

runtime:
  seed: 42
  device: "cpu"
  require_gpu: false
  precision: "single"
  torch_deterministic: false

input:
  label_file: "tests/fixtures/scenes/test/test5.json"
  scene_file: "tests/fixtures/scenes/test/scene.xml"
  scene_id: "scene"
  map_id: ""
  label_schema: "simplesionna_v1"
  coordinate_system: "scene_local_xyz_m"
  max_bs: 6
  max_ue: 100

output:
  profile: "rt_labels_only"
  root_dir: "outputs/rt_labels_only"
  run_id_format: "{label_stem}_{timestamp}"
  hdf5_filename: "results.h5"
  compression: "gzip"
  save_full_paths: false

carrier:
  center_frequency_hz: 3500000000.0
  bandwidth_hz: 20000000.0
  num_subcarriers: 64

rt:
  max_depth: 1
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: false
  diffraction: false
  synthetic_array: false
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

phy:
  enabled: false

noncooperative:
  enabled: false
  signal_standard: "nr_srs"
  active_tx_count: 2
  frame_policy: "sequential"
  resource_strategy: "comb_offset"
  save_time_clean: true
  save_time_observed: true
  cp_length: null

array:
  spectrum:
    enabled: false

ranging:
  enabled: false

visualization:
  enabled: false

motion:
  enabled: false
  mobility_mode: "static"
  num_time_steps: 1
  sampling_frequency_hz: 0.0
  bs_velocity_mps: [0.0, 0.0, 0.0]
  ue_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: false
  profile_id: "synthetic_default"
