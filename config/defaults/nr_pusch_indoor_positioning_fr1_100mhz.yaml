# SionnaMeasurementSim – indoor FR1 NR uplink positioning template
# All physical quantities are in SI units unless stated otherwise.
#
# Target deployment scenario:
#   - Indoor FR1 private/enterprise 5G positioning
#   - Nominal NR channel bandwidth: 100 MHz
#   - SCS: 30 kHz
#   - Transmission bandwidth configuration: 273 PRB
#   - Active subcarriers: 273 * 12 = 3276
#   - BS/gNB array: 4x4 UPA
#   - UE uplink antenna model: 1x2, matching a 2T-style handset uplink model
#
# Note:
#   This template uses NR PUSCH/DMRS as a CSI proxy. For sounding-style positioning
#   experiments, compare against nr_srs_indoor_positioning_fr1_100mhz.yaml, which
#   implements full-band SRS-like uplink sounding (not yet complete 3GPP NR SRS).

runtime:
  seed: 42
  device: "cuda"

debug:
  enabled: false
  hardware_interval_s: 1.0
  link_log_interval: 250
  torch_synchronize: true
  write_hardware_samples: true

input:
  label_file: "data/bistro_0000/label.json"
  scene_file: "data/bistro_0000/scene.xml"
  scene_id: "bistro_0000"
  map_id: ""
  max_bs: 6                 # indoor gNB/TRP count
  max_ue: 1000              # target UE/sample-position count; run small smoke first

output:
  root_dir: "outputs/indoor_fr1_100mhz_positioning"
  hdf5_filename: "results.h5"
  compression: "gzip"
  save_full_paths: false    # set true only for small AoA/path debugging runs
  sharding:
    enabled: true
    axis: "ue"
    shard_size: 5           # 100 MHz / 3276 SC needs small shards on 24 GB GPUs
    filename_pattern: "result_{shard_index:03d}.h5"
    parallel_workers: 1
    gpu_ids: []
    visualization_mode: "first_shard"

carrier:
  center_frequency_hz: 3500000000.0
  # Active occupied bandwidth for 273 PRB at 30 kHz SCS.
  # Nominal NR channel bandwidth is 100 MHz; active BW is 273*12*30 kHz = 98.28 MHz.
  bandwidth_hz: 98280000.0
  num_subcarriers: 3276

antenna:
  bs_array:
    num_rows: 4             # BS/gNB: 4x4 = 16 receive antennas for UL PUSCH
    num_cols: 4
    vertical_spacing_lambda: 0.5
    horizontal_spacing_lambda: 0.5
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]
  ue_array:
    num_rows: 1             # UE: 1x2 = 2 uplink transmit antennas
    num_cols: 2
    vertical_spacing_lambda: 0.5
    horizontal_spacing_lambda: 0.5
    polarization: "V"
    pattern: "iso"
    orientation_mode: "fixed"
    orientation_rad: [0.0, 0.0, 0.0]

array:
  spectrum:
    enabled: true
    sources: ["truth_cfr", "cfr_est"]
    method: "bartlett"
    zenith_bins: 91
    azimuth_bins: 181
    zenith_min_rad: 0.0
    zenith_max_rad: 3.141592653589793
    azimuth_min_rad: -3.141592653589793
    azimuth_max_rad: 3.141592653589793
    normalize: "per_link_max"
    aggregate_subcarriers: "mean"
    aggregate_symbols: "mean"
    link_chunk_size: 128

visualization:
  enabled: true
  output_dir: "figures"
  sample_policy: "spatially_spread_valid_links"
  random_seed: 42
  max_bs: 5
  sample_ue_count: 5
  max_ue: 5
  dpi: 140
  format: "png"
  plots:
    - "topology"
    - "link_overview"
    - "cfr_lines"
    - "cfr_heatmap"
    - "cfr_error"
    - "waveform_grid"
    - "aoa"
    - "nlos_paths"
    - "spatial_spectrum"
    - "nmse_snr"
    - "path_samples"

rt:
  max_depth: 4
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: true
  diffraction: true
  # Use synthetic_array for standard array-manifold/AoA experiments.
  # Set false for element-level visibility/blockage studies.
  synthetic_array: true
  normalize_cfr: false
  normalize_delays: false
  merge_shapes: false

link:
  duplex_mode: "tdd"
  phy_link_direction: "uplink"

phy:
  enabled: true
  standard: "nr_pusch"
  mimo_mode: "su_mimo"
  channel_backend: "apply_ofdm"
  # Realistic deployment observation path: estimate CSI from DMRS instead of perfect CSI.
  perfect_csi: false
  snr_db: 30.0
  ebno_db: null
  num_prb: 273
  num_layers: 2
  num_antenna_ports: 2
  mcs_index: 14
  mcs_table: 1
  subcarrier_spacing_khz: 30
  num_ofdm_symbols: 14
  pusch_dmrs_config_type: 1
  pusch_dmrs_length: 1
  pusch_dmrs_additional_position: 2
  pusch_num_cdm_groups_without_data: 2
  mimo_detector: "lmmse"
  channel_estimator: "pusch_ls"
  receiver_failure_policy: "mark_invalid"
  su_mimo_link_batch_size: 16
  tx_power_dbm: 0.0

impairments:
  awgn:
    enabled: true
  cfo:
    enabled: false
    cfo_hz: null
  sfo:
    enabled: false
    sfo_ppm: null
  phase_noise:
    enabled: false
    phase_offset_rad: null
  timing_offset:
    enabled: false
    timing_offset_samples: null
  agc_adc:
    enabled: false
    agc_gain_db: 0.0
    clipping_threshold: null
  impairment_seed: 142

receiver:
  estimator_type: "pusch_ls"
  channel_estimator: "pusch_ls"
  mimo_detector: "lmmse"
  sync_method: "ideal"
  interpolation_method: "lin"
  failure_policy: "mark_invalid"
  calibration_profile_id: "synthetic_default"

motion:
  enabled: false
  mobility_mode: "static"
  num_time_steps: 1
  sampling_frequency_hz: 0.0
  bs_velocity_mps: [0.0, 0.0, 0.0]
  ue_velocity_mps: [0.0, 0.0, 0.0]

calibration:
  enabled: true
  profile_id: "synthetic_default"
